<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora & Liam's 1st Birthday - Photo Album</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 1;
        }
        
        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 20px;
        }
        
        .lightbox.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.2s;
        }
        
        .lightbox-close:hover {
            color: #ccc;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 20px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .lightbox-nav:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .lightbox-prev {
            left: 20px;
        }
        
        .lightbox-next {
            right: 20px;
        }
        
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            
            .lightbox-close {
                right: 15px;
                font-size: 30px;
            }
            
            .lightbox-nav {
                padding: 15px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Nora & Liam 🎉</h1>
            <p>1st Birthday Celebration - June 13, 2026</p>
        </div>
        
        <div class="gallery" id="gallery">
            <div class="loading">Loading photos...</div>
        </div>
    </div>
    
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <button class="lightbox-nav lightbox-prev" onclick="prevPhoto()">&lt;</button>
            <button class="lightbox-nav lightbox-next" onclick="nextPhoto()">&gt;</button>
        </div>
    </div>
    
    <script>
        let photos = [];
        let currentPhotoIndex = 0;
        
        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            photos = [];
            
            for (let i = 1; i <= 500; i++) {
                const photoNum = String(i).padStart(4, '0');
                const photoPath = `./public/photos/${photoNum}.JPG`;
                
                const img = new Image();
                img.src = photoPath;
                
                img.onload = function() {
                    photos.push(photoPath);
                    createGalleryItem(photoPath, photos.length - 1);
                };
            }
            
            setTimeout(() => {
                if (photos.length === 0) {
                    gallery.innerHTML = '<div class="loading">Loading photos...</div>';
                }
            }, 2000);
        }
        
        function createGalleryItem(photoPath, index) {
            const gallery = document.getElementById('gallery');
            if (gallery.querySelector('.loading')) {
                gallery.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = photoPath;
            img.alt = `Photo ${index + 1}`;
            img.onclick = () => openLightbox(index);
            
            item.appendChild(img);
            gallery.appendChild(item);
        }
        
        function openLightbox(index) {
            currentPhotoIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = photos[currentPhotoIndex];
            lightbox.classList.add('active');
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }
        
        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            document.getElementById('lightbox-img').src = photos[currentPhotoIndex];
        }
        
        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            document.getElementById('lightbox-img').src = photos[currentPhotoIndex];
        }
        
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'ArrowRight') nextPhoto();
                if (e.key === 'ArrowLeft') prevPhoto();
                if (e.key === 'Escape') closeLightbox();
            }
        });
        
        window.addEventListener('load', loadPhotos);
        setInterval(loadPhotos, 3000);
    </script>
</body>
</html>
